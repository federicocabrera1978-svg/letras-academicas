<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Letras Académicas - Instituto Belgrano</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="app">

  <!-- LANDING PÚBLICA -->
  <div id="landing-screen" class="landing-screen">
    <div class="landing-hero">
      <h1>Letras <span style="color:#fca5a5;font-style:italic">Académicas</span></h1>
      <p style="font-size:1.2rem; max-width:600px; margin:0 auto; color:#cbd5e1;">
        Alfabetización Académica · Instituto Belgrano<br>
        Espacio de escritura, lectura y devolución entre pares.
      </p>
      <button class="google-btn" id="login-google-btn">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg" alt="Google" style="width:20px;">
        Ingresar con Google
      </button>
    </div>
    <div class="landing-preview">
      <h2 style="font-family:var(--font-serif); margin-bottom:30px;">📚 Textos destacados</h2>
      <div id="landing-textos"></div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div class="topbar hidden" id="topbar">
    <div class="topbar-brand">Letras <span>Académicas</span></div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn-outline" style="color:#fff; border-color:rgba(255,255,255,0.2); padding:6px;">🌓</button>
      <div style="display:flex; align-items:center; gap:8px;">
        <img id="topbar-avatar" class="avatar hidden" src="" alt="Avatar">
        <span id="topbar-uname" style="font-weight:500;"></span>
      </div>
      <button id="btn-logout" class="btn-outline" style="color:#fff; border-color:rgba(255,255,255,0.2); padding:6px 12px;" onclick="doLogout()">
        🚪 <span>Salir</span>
      </button>
    </div>
  </div>

  <div class="main hidden" id="main-layout">
    <div class="sidebar">
      <div style="padding:0 24px 10px; font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Menú</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span> <span>◈ Inicio</span></div>
      <div class="nav-item" data-page="textos"     onclick="navigate('textos')">    <span class="nav-icon">📚</span> <span>◇ Textos</span></div>
      <div class="nav-item" data-page="nuevo"      onclick="navigate('nuevo')">     <span class="nav-icon">✍️</span> <span>＋ Publicar</span></div>
      <div class="nav-item" data-page="miembros"   onclick="navigate('miembros')">  <span class="nav-icon">👥</span> <span>◎ Compañeros</span></div>
      <div style="padding:20px 24px 10px; font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Mi cuenta</div>
      <div class="nav-item" data-page="mis-textos" onclick="navigate('mis-textos')"><span class="nav-icon">📁</span> <span>◻ Mis textos</span></div>
    </div>
    <div class="content" id="content-area"></div>
  </div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script src="index.js"></script>

</body>
</html>
