<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letras Académicas - Instituto Belgrano</title>

<!-- Fuentes: Lora para lectura, Inter para interfaz -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<!-- Quill.js CSS (Editor Enriquecido) -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   VARIABLES Y MODO OSCURO (ESTILO CLÁSICO)
   ═══════════════════════════════════════════════════════════════ */
:root {
    --bg-body: #fbfaf8; --bg-nav: #1e293b; --bg-sidebar: #ffffff; --bg-card: #ffffff;
    --text-main: #1e293b; --text-muted: #64748b; --border-color: #e2e8f0;
    --accent: #8b1818; --accent-hover: #6a1212; --accent-light: #fef2f2;
    --font-serif: 'Lora', Georgia, serif; --font-sans: 'Inter', sans-serif;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.05); --r: 8px;
    --ok: #15803d; --warn: #b45309; --purple: #6d28d9;
}

body.dark-mode {
    --bg-body: #0f172a; --bg-nav: #020617; --bg-sidebar: #1e293b; --bg-card: #1e293b;
    --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: #334155;
    --accent: #e14d4d; --accent-hover: #fca5a5; --accent-light: rgba(225, 77, 77, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg-body); color: var(--text-main); font-size: 15px; transition: background 0.3s, color 0.3s; }
.hidden { display: none !important; }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT PRINCIPAL
   ═══════════════════════════════════════════════════════════════ */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar { background: var(--bg-nav); color: #fff; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-brand { font-family: var(--font-serif); font-size: 20px; font-weight: 600; }
.topbar-brand span { color: #fca5a5; font-style: italic; }
.topbar-right { display: flex; align-items: center; gap: 15px; }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 20px 0; overflow-y: auto; transition: background 0.3s; }
.nav-item { padding: 12px 24px; cursor: pointer; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 12px; border-left: 3px solid transparent; transition: all 0.2s; }
.nav-item:hover { background: var(--bg-body); color: var(--text-main); }
.nav-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); }
.content { flex: 1; overflow-y: auto; padding: 32px 40px; }

/* ═══════════════════════════════════════════════════════════════
   COMPONENTES UI
   ═══════════════════════════════════════════════════════════════ */
button { font-family: var(--font-sans); cursor: pointer; border-radius: 6px; border: none; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; padding: 10px 20px; font-weight: 500; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; }
.btn-outline:hover { background: var(--bg-body); }

.page-header { margin-bottom: 30px; }
.page-header h1 { font-family: var(--font-serif); font-size: 28px; color: var(--text-main); margin-bottom: 8px; }

/* Tarjetas */
.text-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--r); padding: 24px; margin-bottom: 16px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s; }
.text-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.text-title { font-family: var(--font-serif); font-size: 20px; font-weight: 600; margin-bottom: 10px; color: var(--text-main); }
.tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.tag.ensayo { background: rgba(21, 128, 61, 0.1); color: var(--ok); }
.tag.informe { background: rgba(180, 83, 9, 0.1); color: var(--warn); }
.tag.resumen { background: rgba(109, 40, 217, 0.1); color: var(--purple); }
.tag.otro { background: var(--accent-light); color: var(--accent); }
.text-excerpt { color: var(--text-muted); line-height: 1.6; margin: 12px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Dashboard & Detalles */
.welcome-banner { background: var(--bg-nav); color: #fff; border-radius: var(--r); padding: 32px; margin-bottom: 30px; }
.welcome-banner h2 { font-family: var(--font-serif); font-size: 24px; margin-bottom: 10px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 40px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: var(--r); text-align: center; }
.stat-value { font-family: var(--font-serif); font-size: 32px; font-weight: 600; color: var(--accent); }

.detail-body { font-family: var(--font-serif); font-size: 1.15rem; line-height: 1.8; color: var(--text-main); margin: 30px 0; }
.detail-body img { max-width: 100%; border-radius: var(--r); }
.comments-section { border-top: 1px solid var(--border-color); padding-top: 30px; }
.comment { background: var(--bg-body); padding: 16px; border-radius: var(--r); margin-bottom: 12px; border: 1px solid var(--border-color); }

/* Formularios y Quill */
input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-body); color: var(--text-main); font-family: var(--font-sans); outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
.ql-toolbar.ql-snow { border-color: var(--border-color) !important; background: var(--bg-sidebar); border-radius: 6px 6px 0 0; }
.ql-container.ql-snow { border-color: var(--border-color) !important; font-family: var(--font-serif); font-size: 1.1rem; min-height: 300px; border-radius: 0 0 6px 6px; background: var(--bg-sidebar); }
body.dark-mode .ql-snow .ql-stroke { stroke: var(--text-main); }
body.dark-mode .ql-snow .ql-fill { fill: var(--text-main); }
body.dark-mode .ql-snow .ql-picker { color: var(--text-main); }

/* Landing */
.landing-screen { position: fixed; inset: 0; z-index: 90; background: var(--bg-body); overflow-y: auto; text-align: center; }
.landing-hero { background: var(--bg-nav); color: #fff; padding: 100px 20px; }
.landing-hero h1 { font-family: var(--font-serif); font-size: 48px; margin-bottom: 20px; }
.google-btn { background: #fff; color: #333; display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px; font-size: 16px; border-radius: 8px; font-weight: 500; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.google-btn:hover { background: #f8f9fa; }
</style>
</head>
<body>

<div id="app">

    <!-- LANDING PÚBLICA -->
    <div id="landing-screen" class="landing-screen">
        <div class="landing-hero">
            <h1>Letras <span style="color:#fca5a5;font-style:italic">Académicas</span></h1>
            <p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto; color: #cbd5e1;">Alfabetización Académica · Instituto Belgrano<br>Espacio de escritura, lectura y devolución entre pares.</p>
            <button class="google-btn" id="login-google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width:20px;">
                Ingresar con Google
            </button>
        </div>
        <div style="max-width: 900px; margin: 60px auto; padding: 0 20px; text-align: left;">
            <h2 style="font-family: var(--font-serif); margin-bottom: 30px;">📚 Textos destacados del instituto</h2>
            <div id="landing-textos">Cargando textos...</div>
        </div>
    </div>

    <!-- APP SHELL -->
    <div class="topbar hidden" id="topbar">
        <div class="topbar-brand">Letras <span>Académicas</span></div>
        <div class="topbar-right">
            <button id="theme-toggle" class="btn-outline" style="color:#fff; border-color:rgba(255,255,255,0.2);">🌓 Modo Oscuro</button>
            <span id="topbar-uname" style="font-weight: 500;"></span>
            <button class="btn-outline" style="color:#fff; border-color:rgba(255,255,255,0.2);" onclick="doLogout()">Salir</button>
        </div>
    </div>

    <div class="main hidden" id="main-layout">
        <div class="sidebar">
            <div style="padding:0 24px 10px; font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Menú</div>
            <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">◈ Inicio</div>
            <div class="nav-item" data-page="textos" onclick="navigate('textos')">◇ Textos</div>
            <div class="nav-item" data-page="nuevo" onclick="navigate('nuevo')">＋ Publicar texto</div>
            <div class="nav-item" data-page="miembros" onclick="navigate('miembros')">◎ Compañeros</div>
            <div style="padding:20px 24px 10px; font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Mi cuenta</div>
            <div class="nav-item" data-page="mis-textos" onclick="navigate('mis-textos')">◻ Mis textos</div>
        </div>
        <div class="content" id="content-area"></div>
    </div>

</div>

<!-- LIBRERÍAS EXTERNAS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════
// 1. CONFIGURACIÓN SUPABASE Y VARIABLES
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://xjrdjesezseuofjoqpzn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c6zrWAExpbRtV6tfrYS2fg_7BpKUO1P';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null; 
let currentPage = 'dashboard';
let allTexts = [];
let allUsers = [];
let quillEditor = null;

// Utilidades DOM
function showEl(id){document.getElementById(id).classList.remove('hidden')}
function hideEl(id){document.getElementById(id).classList.add('hidden')}
function formatDate(ts){return ts ? new Date(ts).toLocaleDateString('es-AR', {year:'numeric',month:'long',day:'numeric'}) : '';}

// Modo Oscuro
const themeToggle = document.getElementById('theme-toggle');
if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
});

// ═══════════════════════════════════════════════════════════════
// 2. AUTENTICACIÓN GOOGLE Y SINCRONIZACIÓN (TABLA PERFILES)
// ═══════════════════════════════════════════════════════════════
document.getElementById('login-google-btn').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
});

async function doLogout(){
    await db.auth.signOut();
    currentUser = null;
    hideEl('topbar'); hideEl('main-layout'); showEl('landing-screen');
}

db.auth.onAuthStateChange(async (event, session) => {
    if (session) {
        const email = session.user.email;
        const name = session.user.user_metadata.full_name || email.split('@')[0];
        const baseUsername = email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, '');

        // Buscar si ya existe en la tabla PERFILES
        let { data: userProfile } = await db.from('perfiles').select('*').eq('id', session.user.id).maybeSingle();
        
        if (!userProfile) {
            // Insertar asociándolo a su UUID
            const newProfile = {
                id: session.user.id,
                username: baseUsername,
                name: name,
                color: '#2d5a8e',
                rol: (email === 'federicocabrera1978@gmail.com') ? 'profesor' : 'alumno'
            };
            await db.from('perfiles').insert([newProfile]);
            userProfile = newProfile;
        }

        currentUser = userProfile;
        document.getElementById('topbar-uname').textContent = currentUser.name;
        
        hideEl('landing-screen'); showEl('topbar'); showEl('main-layout');
        await refreshData();
        navigate('dashboard');
    } else {
        hideEl('topbar'); hideEl('main-layout'); showEl('landing-screen');
        await refreshData();
        renderLandingTextos();
    }
});

// ═══════════════════════════════════════════════════════════════
// 3. CARGA DE DATOS (TEXTOS, PERFILES)
// ═══════════════════════════════════════════════════════════════
async function refreshData(){
    const {data: uData} = await db.from('perfiles').select('*');
    allUsers = uData || [];
    
    const {data: tData} = await db.from('textos').select('*').order('created_at', {ascending: false});
    allTexts = tData || [];
}

// ═══════════════════════════════════════════════════════════════
// 4. VISTAS DE LA APLICACIÓN (ENRUTADOR)
// ═══════════════════════════════════════════════════════════════
function navigate(page){
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    const ca = document.getElementById('content-area');
    
    const pages = {
        dashboard: renderDashboard,
        textos: renderTextos,
        nuevo: renderNuevo,
        miembros: renderMiembros,
        'mis-textos': renderMisTextos
    };
    
    ca.innerHTML = (pages[page] || renderDashboard)();
    
    // Inicializar o Limpiar Quill
    if(page === 'nuevo') {
        if(!quillEditor) {
            quillEditor = new Quill('#editor-container', {
                theme: 'snow',
                placeholder: 'Redacta tu texto académico aquí...',
                modules: { toolbar: [ [{ 'header': [2, 3, false] }], ['bold', 'italic', 'blockquote'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean'] ] }
            });
        } else {
            quillEditor.setContents([]); // Limpiar editor si ya existía
        }
    }
    ca.scrollTop = 0;
}

// VISTA: Dashboard
function renderDashboard(){
    const myT = allTexts.filter(t => t.author_username === currentUser.username).length;
    const recent = allTexts.slice(0, 3);
    return `
        <div class="welcome-banner">
            <h2>Bienvenido/a, ${currentUser.name.split(' ')[0]}</h2>
            <p style="opacity: 0.9; max-width: 600px;">Tu espacio de escritura académica compartida. Publicá textos, leé a tus compañeros y dejá devoluciones constructivas.</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">${allTexts.length}</div><div style="color:var(--text-muted);font-size:13px;margin-top:5px;">Textos en plataforma</div></div>
            <div class="stat-card"><div class="stat-value">${myT}</div><div style="color:var(--text-muted);font-size:13px;margin-top:5px;">Tus publicaciones</div></div>
            <div class="stat-card"><div class="stat-value">${allUsers.length}</div><div style="color:var(--text-muted);font-size:13px;margin-top:5px;">Compañeros</div></div>
        </div>
        <h3 style="font-family:var(--font-serif); margin-bottom: 20px;">Últimas publicaciones</h3>
        ${recent.length ? recent.map(t => cardHtml(t)).join('') : '<p>No hay publicaciones aún.</p>'}
    `;
}

// VISTA: Todos los Textos
function renderTextos(){
    return `
        <div class="page-header">
            <h1>Biblioteca Virtual</h1>
            <p style="color:var(--text-muted)">Explora y comenta las producciones de tus compañeros.</p>
        </div>
        <div style="display:grid; gap:20px;">
            ${allTexts.length ? allTexts.map(t => cardHtml(t)).join('') : '<p>Aún no hay textos publicados.</p>'}
        </div>
    `;
}

// Generador de Tarjeta
function cardHtml(t){
    // Extraer texto plano para la vista previa
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = t.body;
    const plainText = tempDiv.textContent || tempDiv.innerText || "";
    
    return `
    <div class="text-card" onclick="openText('${t.id}')">
        <div class="text-title">${t.title}</div>
        <div style="margin-bottom: 10px;">
            <span class="tag ${t.type}">${t.type}</span>
            <span style="font-size:13px; color:var(--text-muted); margin-left:10px;">${formatDate(t.created_at)}</span>
            ${t.destacado ? '<span style="font-size:13px; color:#d97706; margin-left:10px; font-weight:600;">⭐ Destacado</span>' : ''}
        </div>
        <div class="text-excerpt">${plainText}</div>
        <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size: 14px; font-weight:500;">👤 ${t.author_name}</span>
            <span style="font-size: 14px; color:var(--text-muted);">❤️ ${t.likes || 0}</span>
        </div>
    </div>`;
}

// VISTA: Nuevo Texto
function renderNuevo(){
    return `
    <div class="page-header"><h1>Publicar un texto</h1></div>
    <div style="background:var(--bg-card); padding:30px; border-radius:var(--r); border:1px solid var(--border-color);">
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:500;">Título</label>
            <input type="text" id="f-title" placeholder="Ej: Análisis del Quijote">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:500;">Tipo de texto</label>
            <select id="f-type">
                <option value="ensayo">Ensayo</option>
                <option value="informe">Informe</option>
                <option value="resumen">Resumen</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:500;">Contenido</label>
            <div id="editor-container"></div>
        </div>
        <button class="btn-primary" onclick="submitText()" id="btn-pub">Publicar en la plataforma</button>
    </div>`;
}

async function submitText(){
    const title = document.getElementById('f-title').value.trim();
    const type = document.getElementById('f-type').value;
    const bodyHTML = quillEditor.root.innerHTML; 
    const textPlain = quillEditor.getText().trim();

    if(!title || !textPlain) { alert('Por favor, completa el título y el contenido.'); return; }
    document.getElementById('btn-pub').disabled = true;

    await db.from('textos').insert([{
        title: title, author_username: currentUser.username, author_name: currentUser.name,
        type: type, body: bodyHTML, destacado: false, likes: 0, date: new Date().toISOString()
    }]);

    await refreshData();
    navigate('textos');
}

// VISTA: Detalle del Texto
async function openText(id){
    const t = allTexts.find(x => x.id === id); if(!t) return;
    const ca = document.getElementById('content-area');
    
    // Cargar comentarios
    const {data: coms} = await db.from('comentarios').select('*').eq('texto_id', id).order('created_at', {ascending: true});
    
    // Check Like
    const {data: myLike} = await db.from('likes').select('*').eq('texto_id', id).eq('user_username', currentUser.username).maybeSingle();
    const yaDioLike = !!myLike;

    ca.innerHTML = `
    <button class="btn-outline" style="margin-bottom: 20px;" onclick="navigate('${currentPage}')">← Volver</button>
    
    <div style="margin-bottom:30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
        <h1 style="font-family:var(--font-serif); font-size: 36px; line-height: 1.2; margin-bottom: 15px;">${t.title}</h1>
        <div style="display:flex; gap: 15px; align-items:center; flex-wrap:wrap;">
            <span class="tag ${t.type}">${t.type}</span>
            <span style="color:var(--text-muted);">${formatDate(t.created_at)}</span>
            <span style="font-weight:500;">👤 ${t.author_name}</span>
            <button class="btn-outline" onclick="toggleLike('${t.id}', ${yaDioLike})" style="${yaDioLike ? 'color:var(--accent);border-color:var(--accent);' : ''}">
                ${yaDioLike ? '❤️ Ya no me gusta' : '🤍 Me gusta'} (${t.likes || 0})
            </button>
            ${currentUser.rol === 'profesor' ? `<button class="btn-outline" onclick="toggleDestacado('${t.id}', ${t.destacado})">${t.destacado ? 'Quitar Destacado' : '⭐ Destacar'}</button>` : ''}
            ${currentUser.username === t.author_username ? `<button class="btn-outline" style="color:var(--warn);border-color:var(--warn);" onclick="deleteText('${t.id}')">Eliminar</button>` : ''}
        </div>
    </div>
    
    <div class="detail-body">${t.body}</div> 
    
    <div class="comments-section">
        <h3 style="font-family:var(--font-serif); margin-bottom: 20px;">Devoluciones (${coms ? coms.length : 0})</h3>
        ${(coms && coms.length) ? coms.map(c => `
            <div class="comment">
                <div style="font-weight:600; font-size:13px; margin-bottom:5px;">${c.author_name} <span style="font-weight:400; color:var(--text-muted); margin-left:10px;">${formatDate(c.created_at)}</span></div>
                <div style="color:var(--text-main); line-height:1.6;">${c.body}</div>
            </div>
        `).join('') : '<p style="color:var(--text-muted); margin-bottom: 20px;">Aún no hay devoluciones. ¡Sé el primero!</p>'}
        
        <div style="margin-top: 30px; background:var(--bg-card); padding:20px; border-radius:var(--r); border:1px solid var(--border-color);">
            <h4 style="margin-bottom:10px;">Añadir devolución</h4>
            <textarea id="new-comment" style="min-height:100px; margin-bottom:10px;" placeholder="Escribe un comentario constructivo..."></textarea>
            <button class="btn-primary" id="btn-comment" onclick="submitComment('${t.id}')">Enviar comentario</button>
        </div>
    </div>`;
}

async function toggleLike(textId, yaDioLike){
    const t = allTexts.find(x => x.id === textId);
    if(yaDioLike){
        await db.from('likes').delete().eq('texto_id', textId).eq('user_username', currentUser.username);
        t.likes = Math.max(0, (t.likes || 1) - 1);
    } else {
        await db.from('likes').insert([{texto_id: textId, user_username: currentUser.username}]);
        t.likes = (t.likes || 0) + 1;
    }
    await db.from('textos').update({likes: t.likes}).eq('id', textId);
    openText(textId); 
}

async function toggleDestacado(textId, isDestacado){
    await db.from('textos').update({destacado: !isDestacado}).eq('id', textId);
    await refreshData();
    openText(textId);
}

async function submitComment(id){
    const txt = document.getElementById('new-comment').value.trim(); if(!txt) return;
    document.getElementById('btn-comment').disabled = true;
    await db.from('comentarios').insert([{texto_id: id, author_username: currentUser.username, author_name: currentUser.name, body: txt}]);
    openText(id);
}

async function deleteText(id){
    if(!confirm('¿Estás seguro de eliminar este texto permanentemente?')) return;
    
    // Primero borrar likes y comentarios en cascada manual por seguridad (si no lo tienes configurado en la BDD)
    await db.from('likes').delete().eq('texto_id', id);
    await db.from('comentarios').delete().eq('texto_id', id);
    // Luego borrar el texto
    await db.from('textos').delete().eq('id', id);
    
    await refreshData();
    navigate('mis-textos');
}

// VISTA: Compañeros
function renderMiembros(){
    return `<div class="page-header"><h1>Compañeros</h1></div>
    <div style="display:grid; gap:15px;">
        ${allUsers.map(u => `
            <div style="background:var(--bg-card); padding:15px 20px; border-radius:var(--r); border:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-weight:600;">${u.name} ${u.rol === 'profesor' ? '<span style="color:var(--accent); font-size:12px; margin-left:10px;">👨‍🏫 Profesor</span>' : ''}</div>
                    <div style="color:var(--text-muted); font-size:13px;">@${u.username}</div>
                </div>
            </div>
        `).join('')}
    </div>`;
}

function renderMisTextos(){
    const mine = allTexts.filter(t => t.author_username === currentUser.username);
    return `<div class="page-header"><h1>Mis Textos</h1></div>
            <div style="display:grid; gap:20px;">${mine.length ? mine.map(t => cardHtml(t)).join('') : '<p>No tienes textos publicados.</p>'}</div>`;
}

function renderLandingTextos(){
    const destacados = allTexts.filter(t => t.destacado);
    const container = document.getElementById('landing-textos');
    if(destacados.length === 0){ container.innerHTML = '<p style="color:var(--text-muted);">Próximamente se publicarán los textos destacados.</p>'; return; }
    container.innerHTML = destacados.map(t => cardHtml(t)).join('');
}

// Iniciar
db.auth.getSession().then(({ data: { session } }) => {
    if(!session) { refreshData().then(() => renderLandingTextos()); }
});
